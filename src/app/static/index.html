<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doc Finder</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    .app { display: flex; height: 100vh; width: 100vw; }

    /* Chat Panel */
    .chat-panel { width: 400px; min-width: 350px; display: flex; flex-direction: column; background: #fff; border-right: 1px solid #e0e0e0; }
    .chat-header { padding: 16px 20px; border-bottom: 1px solid #e0e0e0; background: #1b3a4b; color: #fff; }
    .chat-header h2 { font-size: 18px; margin-bottom: 4px; }
    .chat-header p { font-size: 13px; opacity: 0.8; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; }
    .chat-empty { color: #888; padding: 20px 0; }
    .chat-empty ul { margin-top: 8px; padding-left: 20px; }
    .chat-empty li { margin: 6px 0; font-size: 14px; font-style: italic; }
    .chat-message { margin-bottom: 12px; }
    .chat-message .message-content { padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 90%; white-space: pre-wrap; }
    .chat-message.user .message-content { background: #1b3a4b; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .chat-message.assistant .message-content { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
    .chat-message .loading { color: #888; font-style: italic; }
    .feedback-buttons { display: flex; gap: 6px; margin-top: 6px; }
    .feedback-buttons button { background: none; border: 1px solid #ddd; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 16px; color: #888; transition: all 0.15s; }
    .feedback-buttons button:hover:not(:disabled) { border-color: #1b3a4b; color: #1b3a4b; }
    .feedback-buttons button.selected { border-color: #1b3a4b; color: #1b3a4b; background: #e8f0f4; }
    .feedback-buttons button:disabled { opacity: 0.4; cursor: default; }
    .feedback-comment { display: flex; gap: 6px; margin-top: 6px; }
    .feedback-comment input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none; }
    .feedback-comment input:focus { border-color: #1b3a4b; }
    .feedback-comment button { padding: 6px 12px; background: #1b3a4b; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .feedback-comment button:disabled { opacity: 0.5; cursor: not-allowed; }
    .feedback-sent { font-size: 12px; color: #888; margin-top: 4px; }
    .chat-input { display: flex; padding: 12px 16px; border-top: 1px solid #e0e0e0; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .chat-input input:focus { border-color: #1b3a4b; }
    .chat-input button { padding: 10px 20px; background: #1b3a4b; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* PDF Viewer */
    .pdf-viewer { flex: 1; display: flex; flex-direction: column; background: #fafafa; }
    .pdf-viewer.empty { align-items: center; justify-content: center; }
    .pdf-placeholder { text-align: center; color: #999; }
    .pdf-placeholder p:first-child { font-size: 18px; margin-bottom: 8px; }
    .pdf-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; }
    .pdf-filename { font-weight: 600; font-size: 14px; }
    .pdf-download { font-size: 13px; color: #1b3a4b; }
    .pdf-frame { flex: 1; border: none; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const e = React.createElement;

    function FeedbackWidget({ traceId, feedback, onVote, onSubmit }) {
      const [comment, setComment] = React.useState("");
      const fb = feedback[traceId];

      if (!traceId) return null;

      // Already submitted
      if (fb && fb.phase === "submitted") {
        return e("div", { className: "feedback-sent" },
          (fb.thumbsUp ? "\u{1F44D}" : "\u{1F44E}") + " Feedback submitted" + (comment ? "" : "")
        );
      }

      // Voted, show comment box
      if (fb && fb.phase === "voted") {
        return e("div", null,
          e("div", { className: "feedback-buttons" },
            e("button", { disabled: true, className: fb.thumbsUp ? "selected" : "" }, "\u{1F44D}"),
            e("button", { disabled: true, className: !fb.thumbsUp ? "selected" : "" }, "\u{1F44E}")
          ),
          e("div", { className: "feedback-comment" },
            e("input", {
              type: "text",
              value: comment,
              onChange: (ev) => setComment(ev.target.value),
              placeholder: "Add a comment (optional)...",
              onKeyDown: (ev) => { if (ev.key === "Enter") onSubmit(traceId, comment); }
            }),
            e("button", { onClick: () => onSubmit(traceId, comment) }, "Send")
          )
        );
      }

      // Not voted yet
      return e("div", { className: "feedback-buttons" },
        e("button", { onClick: () => onVote(traceId, true) }, "\u{1F44D}"),
        e("button", { onClick: () => onVote(traceId, false) }, "\u{1F44E}")
      );
    }

    function ChatPanel({ messages, onSendMessage, onVote, onSubmitFeedback, feedback, isLoading }) {
      const [input, setInput] = React.useState("");
      const messagesEndRef = React.useRef(null);

      React.useEffect(() => {
        if (messagesEndRef.current) {
          messagesEndRef.current.scrollIntoView({ behavior: "smooth" });
        }
      }, [messages]);

      function handleSubmit(ev) {
        ev.preventDefault();
        if (!input.trim() || isLoading) return;
        onSendMessage(input.trim());
        setInput("");
      }

      function stripJsonBlock(text) {
        return text.replace(/```json[\s\S]*?```/g, "").trim();
      }

      return e("div", { className: "chat-panel" },
        e("div", { className: "chat-header" },
          e("h2", null, "Doc Finder"),
          e("p", null, "Describe the document you're looking for")
        ),
        e("div", { className: "chat-messages" },
          messages.length === 0 && e("div", { className: "chat-empty" },
            e("p", null, "Try asking:"),
            e("ul", null,
              e("li", null, '"Find the FDA 510(k) clearance for the shunt catheter"'),
              e("li", null, '"Show me clinical evidence for diabetic foot ulcers"'),
              e("li", null, '"I need the collagen technology brochure"')
            )
          ),
          messages.map((msg, i) =>
            e("div", { key: i, className: "chat-message " + msg.role },
              e("div", { className: "message-content" },
                msg.role === "assistant" ? stripJsonBlock(msg.content) : msg.content
              ),
              msg.role === "assistant" && e(FeedbackWidget, {
                traceId: msg.trace_id,
                feedback: feedback,
                onVote: onVote,
                onSubmit: onSubmitFeedback
              })
            )
          ),
          isLoading && e("div", { className: "chat-message assistant" },
            e("div", { className: "message-content loading" }, "Searching documents...")
          ),
          e("div", { ref: messagesEndRef })
        ),
        e("form", { className: "chat-input", onSubmit: handleSubmit },
          e("input", {
            type: "text",
            value: input,
            onChange: (ev) => setInput(ev.target.value),
            placeholder: "Describe the document you need...",
            disabled: isLoading
          }),
          e("button", { type: "submit", disabled: isLoading || !input.trim() }, "Send")
        )
      );
    }

    function PdfViewer({ filename }) {
      if (!filename) {
        return e("div", { className: "pdf-viewer empty" },
          e("div", { className: "pdf-placeholder" },
            e("p", null, "No document selected"),
            e("p", null, "Chat with the assistant to find a document")
          )
        );
      }
      const url = "/api/docs/" + encodeURIComponent(filename);
      return e("div", { className: "pdf-viewer" },
        e("div", { className: "pdf-header" },
          e("span", { className: "pdf-filename" }, filename),
          e("a", { href: url, target: "_blank", rel: "noopener noreferrer", className: "pdf-download" }, "Open in new tab")
        ),
        e("iframe", { src: url, title: filename, className: "pdf-frame" })
      );
    }

    function App() {
      const [messages, setMessages] = React.useState([]);
      const [currentDoc, setCurrentDoc] = React.useState(null);
      const [isLoading, setIsLoading] = React.useState(false);
      const sessionId = React.useMemo(() => crypto.randomUUID(), []);
      // feedback state: { [traceId]: { thumbsUp: bool, phase: "voted"|"submitted" } }
      const [feedback, setFeedback] = React.useState({});

      function handleVote(traceId, thumbsUp) {
        setFeedback(prev => ({ ...prev, [traceId]: { thumbsUp, phase: "voted" } }));
      }

      async function handleSubmitFeedback(traceId, comment) {
        const fb = feedback[traceId];
        setFeedback(prev => ({ ...prev, [traceId]: { ...fb, phase: "submitted" } }));
        try {
          await fetch("/api/feedback", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({ trace_id: traceId, thumbs_up: fb.thumbsUp, comment: comment || null })
          });
        } catch (err) {
          console.error("Failed to send feedback:", err);
        }
      }

      async function handleSendMessage(message) {
        const userMsg = { role: "user", content: message };
        const updated = [...messages, userMsg];
        setMessages(updated);
        setIsLoading(true);

        try {
          const resp = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            credentials: "include",
            body: JSON.stringify({
              message: message,
              history: updated.map(m => ({ role: m.role, content: m.content })),
              session_id: sessionId
            })
          });
          if (!resp.ok) throw new Error("Chat request failed");
          const data = await resp.json();
          const assistantMsg = {
            role: "assistant",
            content: data.response,
            filename: data.filename,
            score: data.score,
            trace_id: data.trace_id
          };
          setMessages([...updated, assistantMsg]);
          if (data.filename) setCurrentDoc(data.filename);
        } catch (err) {
          setMessages([...updated, {
            role: "assistant",
            content: "Sorry, something went wrong. Please try again."
          }]);
        } finally {
          setIsLoading(false);
        }
      }

      return e("div", { className: "app" },
        e(ChatPanel, { messages, onSendMessage: handleSendMessage, onVote: handleVote, onSubmitFeedback: handleSubmitFeedback, feedback, isLoading }),
        e(PdfViewer, { filename: currentDoc })
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(e(App));
  </script>
</body>
</html>
