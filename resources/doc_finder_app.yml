resources:
  apps:
    doc_finder:
      # App name uses git branch so each branch deploys as a separate app.
      # Branch names must be lowercase with dashes only (no / or _).
      name: doc-finder-${bundle.git.branch}
      description: "Document search app for Integra LifeSciences"
      source_code_path: ../src/app

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: response-model
          serving_endpoint:
            name: ${var.foundation_model}
            permission: CAN_QUERY
        - name: classifier-model
          serving_endpoint:
            name: ${var.classifier_model}
            permission: CAN_QUERY
        # Vector Search endpoint access is granted via UC permissions
        # in 04_grant_app_permissions.py (not a serving_endpoint resource).
