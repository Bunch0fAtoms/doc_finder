resources:
  apps:
    doc_finder:
      # Must match scripts/configure.py DATABRICKS_APP_NAME: doc-finder-<bundle.target> (not raw git branch;
      # branch casing/symbols cannot be sanitized in bundle YAML).
      name: doc-finder-${bundle.target}
      description: "Document search app for Integra LifeSciences"
      source_code_path: ../src/app

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: response-model
          serving_endpoint:
            name: ${var.foundation_model}
            permission: CAN_QUERY
        - name: classifier-model
          serving_endpoint:
            name: ${var.classifier_model}
            permission: CAN_QUERY
        - name: vector-search-endpoint
          serving_endpoint:
            name: ${var.vs_endpoint_name}
            permission: CAN_QUERY
