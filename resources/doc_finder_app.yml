resources:
  apps:
    doc_finder:
      name: doc-finder-${bundle.git.branch}
      description: "Document search app for Integra LifeSciences"
      source_code_path: ../src/app

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: response-model
          serving_endpoint:
            name: ${var.foundation_model}
            permission: CAN_QUERY
        - name: classifier-model
          serving_endpoint:
            name: ${var.classifier_model}
            permission: CAN_QUERY
        - name: vector-search-endpoint
          serving_endpoint:
            name: ${var.vs_endpoint_name}
            permission: CAN_QUERY
