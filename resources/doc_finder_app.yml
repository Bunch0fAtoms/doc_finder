resources:
  apps:
    doc_finder:
      # App name set via app_name variable (max 30 chars).
      # configure.py generates this from the git branch: doc-finder-<branch>.
      name: ${var.app_name}
      description: "Document search app for Integra LifeSciences"
      source_code_path: ../src/app

      resources:
        # SQL Warehouse — keyword search queries
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE

        # Foundation Model API endpoints
        - name: response-model
          serving_endpoint:
            name: ${var.foundation_model}
            permission: CAN_QUERY
        - name: classifier-model
          serving_endpoint:
            name: ${var.classifier_model}
            permission: CAN_QUERY

        # Unity Catalog volume — PDF serving
        - name: pdf-volume
          uc_securable:
            securable_full_name: ${var.catalog}.${var.schema}.${var.volume_name}
            securable_type: VOLUME
            permission: READ_VOLUME

        # doc_summaries table — keyword search queries
        - name: doc-summaries-table
          uc_securable:
            securable_full_name: ${var.catalog}.${var.schema}.doc_summaries
            securable_type: TABLE
            permission: SELECT
