resources:
  apps:
    doc_finder:
      # App name set via app_name variable (max 30 chars).
      # configure.py generates this from the git branch: doc-finder-<branch>.
      name: ${var.app_name}
      description: "Document search app for Integra LifeSciences"
      source_code_path: ../src/app

      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: CAN_USE
        - name: response-model
          serving_endpoint:
            name: ${var.foundation_model}
            permission: CAN_QUERY
        - name: classifier-model
          serving_endpoint:
            name: ${var.classifier_model}
            permission: CAN_QUERY
        # Vector Search endpoint access is granted via UC permissions
        # in 04_grant_app_permissions.py (not a serving_endpoint resource).
