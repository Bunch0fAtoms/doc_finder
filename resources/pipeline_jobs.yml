resources:
  jobs:
    data_pipeline:
      name: "[${bundle.target}] doc-finder: Data Pipeline"
      tasks:
        - task_key: parse_docs
          spark_python_task:
            python_file: ../src/pipeline/01_parse_docs.py
            parameters:
              - --catalog=${var.catalog}
              - --schema=${var.schema}
              - --warehouse-id=${var.warehouse_id}
              - --volume=${var.volume_name}
          environment_key: pipeline_env

        - task_key: summarize_docs
          depends_on:
            - task_key: parse_docs
          spark_python_task:
            python_file: ../src/pipeline/02_summarize_docs.py
            parameters:
              - --catalog=${var.catalog}
              - --schema=${var.schema}
              - --warehouse-id=${var.warehouse_id}
          environment_key: pipeline_env

        - task_key: create_vs_index
          depends_on:
            - task_key: summarize_docs
          spark_python_task:
            python_file: ../src/pipeline/03_create_vs_index.py
            parameters:
              - --catalog=${var.catalog}
              - --schema=${var.schema}
              - --vs-endpoint-name=${var.vs_endpoint_name}
              - --embedding-model=${var.embedding_model}
          environment_key: pipeline_env

      environments:
        - environment_key: pipeline_env
          spec:
            dependencies:
              - databricks-sdk
              - databricks-sql-connector
              - databricks-vectorsearch
            client: "1"
